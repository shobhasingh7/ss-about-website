name: React App CI

# Controls when the workflow will run
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      # 1. Fetch code from the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Initialize Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Automatically caches node_modules for faster subsequent runs

      # 3. Install fresh dependencies safely
      - name: Install dependencies
        run: npm ci


      # 5. Execute your testing suite
      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests

      # 6. Compile the production bundle
      - name: Build production package
        run: npm run build

        - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: 'github-pages'
          path: build
      # 7. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        
